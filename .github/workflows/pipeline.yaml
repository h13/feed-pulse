name: Generate

on:
  schedule:
    - cron: '0 0 * * *' # Daily at 09:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: composer install --no-interaction --prefer-dist

      - name: Create env.json
        run: |
          jq -n \
            --arg key "$ANTHROPIC_API_KEY" \
            --arg slack "$SLACK_WEBHOOK_URL" \
            '{"$schema":"./env.schema.json","ANTHROPIC_API_KEY":$key,"SLACK_WEBHOOK_URL":$slack}' \
            > env.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - run: composer pipeline

      - name: Commit drafts and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: save drafts and update state"
          git push
