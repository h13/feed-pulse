name: Generate

on:
  schedule:
    - cron: '0 0 * * *' # Daily at 09:00 JST
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build image
        run: docker build -t "$IMAGE" .

      - name: Create env.json
        run: |
          jq -n \
            --arg key "$ANTHROPIC_API_KEY" \
            --arg slack "$SLACK_WEBHOOK_URL" \
            '{"$schema":"./env.schema.json","ANTHROPIC_API_KEY":$key,"SLACK_WEBHOOK_URL":$slack}' \
            > env.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run pipeline
        run: |
          docker run --rm \
            -v "$PWD/state:/app/state" \
            -v "$PWD/env.json:/app/env.json:ro" \
            "$IMAGE" bin/pipeline.php

      - name: Commit drafts and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: save drafts and update state"
          git push
