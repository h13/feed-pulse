name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - run: composer install --no-interaction --prefer-dist

      - name: Create env.json
        run: |
          jq -n \
            --arg key "$ANTHROPIC_API_KEY" \
            --arg wp_url "$WORDPRESS_API_URL" \
            --arg wp_user "$WORDPRESS_USER" \
            --arg wp_pass "$WORDPRESS_APP_PASSWORD" \
            --arg x_key "$X_API_KEY" \
            --arg x_secret "$X_API_SECRET" \
            --arg x_token "$X_ACCESS_TOKEN" \
            --arg x_token_secret "$X_ACCESS_SECRET" \
            '{
              "$schema":"./env.schema.json",
              "ANTHROPIC_API_KEY":$key,
              "WORDPRESS_API_URL":$wp_url,
              "WORDPRESS_USER":$wp_user,
              "WORDPRESS_APP_PASSWORD":$wp_pass,
              "X_API_KEY":$x_key,
              "X_API_SECRET":$x_secret,
              "X_ACCESS_TOKEN":$x_token,
              "X_ACCESS_SECRET":$x_token_secret
            }' > env.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_API_URL: ${{ secrets.WORDPRESS_API_URL }}
          WORDPRESS_USER: ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      - run: composer publish

      - name: Create PR with publish history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="publish/$(date +%Y-%m-%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add state/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: publish history $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Publish history $(date +%Y-%m-%d)" \
            --body "Automated publish results. Auto-merging." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
